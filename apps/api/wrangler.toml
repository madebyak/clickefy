name = "clickfy-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
# Workers.dev subdomain stays disabled — we serve traffic from
# api.clickefy.ai exclusively (see `[[routes]]` below). Leaving the
# workers.dev URL live would create a second, unauthenticated entry
# point with the same code, which is a footgun for CORS and analytics.
workers_dev = false

# Observability
[observability]
enabled = true

# ── Custom domain routing ────────────────────────────────────────
# `custom_domain = true` tells Wrangler to create/update a Cloudflare
# Custom Domain for `api.clickefy.ai`, automatically provisioning
# the DNS record and edge cert. The zone (`clickefy.ai`) must already
# exist in the same Cloudflare account.
[[routes]]
pattern = "api.clickefy.ai"
zone_name = "clickefy.ai"
custom_domain = true

# Environment-specific configuration goes below.
# Set secrets via `wrangler secret put <NAME>` (never commit them).
#
# Required secrets to set before first deploy:
#   - DATABASE_URL              (Neon Postgres conn string, ?sslmode=require)
#   - CLERK_PUBLISHABLE_KEY     (Clerk pk_live_…)
#   - CLERK_SECRET_KEY          (Clerk sk_live_…, server-only)
#   - CLERK_JWT_KEY             (PEM public key for offline JWT verification)
#   - REVENUECAT_WEBHOOK_SECRET (filled when subscriptions go live)
#
# Plain (non-secret) vars below.
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

# R2 buckets.
#
# UPLOADS — user-provided assets (admin uploads, mobile user inputs).
#   Created with: `pnpm --filter @clickfy/api exec wrangler r2 bucket create clickfy-uploads`
#
# OUTPUTS — AI-generated assets returned by Trigger.dev tasks.
#   Created with: `pnpm --filter @clickfy/api exec wrangler r2 bucket create clickfy-outputs`
#
# Bindings run in local Miniflare mode in `wrangler dev` (data on
# disk under .wrangler/state) and point at the real cloud buckets
# after `wrangler deploy`. The orchestrator (apps/jobs-worker) reads
# user inputs via the Worker's HTTP route rather than S3, so the
# local/cloud split is invisible to it.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "clickfy-uploads"

[[r2_buckets]]
binding = "OUTPUTS"
bucket_name = "clickfy-outputs"

# ── Rate limiting (native binding) ───────────────────────────────
# Each `[[ratelimits]]` block declares a fixed-window counter that
# `env.<name>.limit({ key }).success` consults. Counters live in the
# same Cloudflare-managed substrate as WAF rate-limiting rules:
# locally cached, asynchronously synced, no network round-trip per
# call. Limits are per Cloudflare location (not global) — fine for our
# mobile-first traffic where a single session pins to one POP.
#
# `namespace_id` must be a unique positive integer per binding in this
# account. Two bindings sharing an id (even across Workers) share the
# same counters — useful for fanning out a single limit across services
# but not what we want here, so each one gets a fresh number.
#
# `simple.period` must be either 10 or 60 seconds. Tuning notes:
#   - RL_PUBLIC_IP  120/60s  guards anonymous catalog + R2 read.
#                            IP-keyed, so generous to absorb shared NAT.
#   - RL_USER_READ  240/60s  authed GETs (jobs list, library, me).
#                            ~4/sec sustained which no real user hits.
#   - RL_USER_WRITE  30/60s  authed mutations (profile edit, favourite,
#                            upload). Bursty UI taps are fine; loops abort.
#   - RL_USER_JOB    10/60s  job creation specifically. Each call debits
#                            credits and spawns a Trigger.dev run, so the
#                            tightest tier. ~1 every 6s — well above the
#                            human creation pace.
#
# These are dialled CONSERVATIVELY on purpose. If a real user ever
# brushes the ceiling, bump the limit, redeploy, done — no migration.

[[ratelimits]]
name = "RL_PUBLIC_IP"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 120
  period = 60

[[ratelimits]]
name = "RL_USER_READ"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 240
  period = 60

[[ratelimits]]
name = "RL_USER_WRITE"
namespace_id = "1003"
  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RL_USER_JOB"
namespace_id = "1004"
  [ratelimits.simple]
  limit = 10
  period = 60
